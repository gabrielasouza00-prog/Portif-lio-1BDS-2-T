<!DOCTYPE html> <!--indica a linguagem de programação a ser utilizada, nesse caso, o HTML. Deve ser a primeira linha do projeto.-->
 <html lang="pt-br"> <!--abertura do documento, todas as tags\códicos devem ser escritas nesse espaço.-->
<head> <!--abertura da tag que define o cabeçalho do documento.O conteúdo inserido nesse espaço não é visível no navegador, mas contém instruçoẽs sobre seu conteúdo e comportamento. Dentro dessa tag, podem ser inseridos folhas de estilo e script.-->
    <meta charset="UTF-8"> <!--especifica qual conjunto de caracteres(character set ou charset) será usado para renderizar o texto da página. o UTF-8 contém todos os caracteres dos padroẽs Unicode e ASCII, o mais utilizado em páginas da web. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifólia</title> <!--título da página\documento.-->
</head> <!--fechamento de tag do cabeçalho.\-->
<body><!-- abertura da tag, marcando o espaço no qual deve estar contído o conteúdo visiual da página. As demais tags que representam texto, botoẽs e outros, devem ser adicionais nesse intervalo.-->
<!--um documento HTML é composto por tags que são escritas entre < >. As tags precisam ser abertas e fechadas, o que as diferenciam é que as tags de fechamento possuem uma \ antes do nome. Alguns códigos não precisam da <\> para fechamento, apenas da barra, como no caso da tag meta. Outro aspecto importante da linguagem é que ela é cas insensitive, ou seja, não leva em consideração a diferença entre letras oficiais e minúsculas, sendo assim, as tags podem ser escritas das duas maneiras.-->
